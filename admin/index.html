---
layout: admin
title: Admin Dashboard
permalink: /admin
---

<div id="loading-screen">
    <div class="spinner-border text-primary" role="status"></div>
    <p class="mt-3">Checking authentication status...</p>
</div>

<div id="admin-dashboard" class="py-4" style="display: none;">
    <div class="container">
        <div class="alert alert-info py-2 small d-flex justify-content-between align-items-center">
            <div>
                <i class="fas fa-info-circle me-2"></i> Logged in as: <span id="admin-email-display">...</span>
            </div>
            <button class="btn btn-sm btn-outline-danger" id="sign-out-button">
                <i class="fas fa-sign-out-alt me-1"></i> Logout
            </button>
        </div>

        <div class="d-flex justify-content-between align-items-center mb-4">
            <div>
                <h2 class="fw-bold mb-0">Manage Products</h2>
                <p class="text-muted small">Manage your store products directly from here.</p>
            </div>
            <button class="btn btn-success rounded-pill px-4" data-bs-toggle="modal" data-bs-target="#productModal" onclick="prepareAdd()">
                <i class="fas fa-plus me-2"></i> Add Product
            </button>
        </div>

        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="table-responsive">
                <table class="table table-hover align-middle mb-0">
                    <thead class="bg-light">
                        <tr>
                            <th class="ps-4">Product</th>
                            <th>Code</th>
                            <th>Price</th>
                            <th>Stock</th>
                            <th class="text-end pe-4">Actions</th>
                        </tr>
                    </thead>
                    <tbody id="product-list">
                        <tr><td colspan="5" class="text-center py-5">Fetching products...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<!-- Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
        <div class="modal-content border-0 shadow-lg rounded-4">
            <div class="modal-header border-0 pb-0 ps-4 pt-4">
                <h5 class="modal-title fw-bold" id="modalTitle">Product Form</h5>
                <button type="button" class="btn-close me-2" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body p-4">
                <form id="product-form">
                    <input type="hidden" id="edit-slug">
                    <div class="row">
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Title</label>
                            <input type="text" id="p-title" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Code</label>
                            <input type="text" id="p-code" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Price (e.g. 15.000)</label>
                            <input type="text" id="p-price" class="form-control" required>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Stock Status</label>
                            <select id="p-stock" class="form-select">
                                <option value="Tersedia">Tersedia</option>
                                <option value="">Habis</option>
                            </select>
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Category</label>
                            <input type="text" id="p-category" class="form-control" placeholder="T-Shirt">
                        </div>
                        <div class="col-md-6 mb-3">
                            <label class="form-label small fw-bold">Tags (Comma separated)</label>
                            <input type="text" id="p-tags" class="form-control" placeholder="Terbaru, Terlaris">
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label small fw-bold">Description</label>
                            <textarea id="p-desc" class="form-control" rows="2"></textarea>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label small fw-bold">Upload Images (Max 5, Max 1MB each)</label>
                            <input type="file" id="p-images" class="form-control" multiple accept="image/*">
                            <div id="image-previews" class="d-flex flex-wrap gap-2 mt-2"></div>
                            <small class="text-muted">Images will automatically create product gallery.</small>
                        </div>
                        <div class="col-12 mb-3">
                            <label class="form-label small fw-bold">Content (Markdown)</label>
                            <textarea id="p-content" class="form-control" rows="4"></textarea>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer border-0 pt-0 pe-4 pb-4">
                <button type="button" class="btn btn-dark rounded-pill px-4" id="save-button" onclick="saveProduct()">Save Product</button>
            </div>
        </div>
    </div>
</div>

<script>
(function() {
  console.log("=== ADMIN DASHBOARD v4.2 (Sync Schema) ===");

  const firebaseConfig = {
    apiKey: "{{ site.env.API_KEY }}",
    authDomain: "{{ site.env.AUTH_DOMAIN }}",
    projectId: "{{ site.env.PROJECT_ID }}",
    storageBucket: "{{ site.env.STORAGE_BUCKET }}",
    messagingSenderId: "{{ site.env.SENDER_ID }}",
    appId: "{{ site.env.APP_ID }}"
  };

  const WORKER_URL = "{{ site.worker_url }}";
  const API_SECRET = "{{ site.api_secret }}";

  let uploadedImages = [];
  let currentStyles = [];

  function init() {
    if (!firebase.apps.length) firebase.initializeApp(firebaseConfig);
    const auth = firebase.auth();

    const DOM = {
      loading: document.getElementById('loading-screen'),
      dashboard: document.getElementById('admin-dashboard'),
      list: document.getElementById('product-list'),
      email: document.getElementById('admin-email-display'),
      form: document.getElementById('product-form'),
      saveBtn: document.getElementById('save-button'),
      modalTitle: document.getElementById('modalTitle'),
      fileInput: document.getElementById('p-images'),
      previews: document.getElementById('image-previews')
    };

    auth.onAuthStateChanged(function(user) {
      if (!user) {
        window.location.href = "{{ '/admin/login' | relative_url }}";
        return;
      }
      DOM.loading.style.display = 'none';
      DOM.dashboard.style.display = 'block';
      DOM.email.textContent = user.email;
      loadProducts(DOM);
    });

    document.getElementById('sign-out-button').onclick = () => auth.signOut();

    DOM.fileInput.onchange = async (e) => {
      const files = Array.from(e.target.files);
      if (files.length > 5) {
          alert("Max 5 images allowed");
          DOM.fileInput.value = '';
          return;
      }

      uploadedImages = [];
      DOM.previews.innerHTML = '';

      for (const file of files) {
        if (file.size > 1024 * 1024) {
          alert(`File ${file.name} is too large (> 1MB)`);
          continue;
        }

        const reader = new FileReader();
        reader.onload = (event) => {
          const base64Data = event.target.result.split(',')[1];
          uploadedImages.push({ name: file.name, data: base64Data });
          
          const img = document.createElement('img');
          img.src = event.target.result;
          img.className = 'rounded border shadow-sm';
          img.style.width = '80px';
          img.style.height = '80px';
          img.style.objectFit = 'cover';
          DOM.previews.appendChild(img);
        };
        reader.readAsDataURL(file);
      }
    };

    window.prepareAdd = function() {
      DOM.form.reset();
      DOM.previews.innerHTML = '';
      uploadedImages = [];
      currentStyles = [];
      document.getElementById('edit-slug').value = '';
      DOM.modalTitle.textContent = 'Add Product';
    };

    window.saveProduct = async function() {
      const slug = document.getElementById('edit-slug').value;
      const tags = document.getElementById('p-tags').value.split(',').map(t => t.trim()).filter(t => t !== '');
      
      const data = {
        code: document.getElementById('p-code').value,
        title: document.getElementById('p-title').value,
        price: document.getElementById('p-price').value,
        stock: document.getElementById('p-stock').value,
        category: document.getElementById('p-category').value,
        tags: tags,
        description: document.getElementById('p-desc').value,
        content: document.getElementById('p-content').value,
        images: uploadedImages,
        styles: currentStyles // Send back existing styles if no new images
      };

      DOM.saveBtn.disabled = true;
      DOM.saveBtn.innerHTML = '<i class="fas fa-spinner fa-spin me-2"></i> Saving...';
      
      try {
        const url = slug ? WORKER_URL + '/products/' + slug : WORKER_URL + '/products';
        const res = await fetch(url, {
          method: slug ? 'PUT' : 'POST',
          headers: { 'Authorization': 'Bearer ' + API_SECRET, 'Content-Type': 'application/json' },
          body: JSON.stringify(data)
        });
        const result = await res.json();
        if (result.error) throw new Error(result.error);
        
        bootstrap.Modal.getInstance(document.getElementById('productModal')).hide();
        loadProducts(DOM);
      } catch (e) { alert("Save Error: " + e.message); }
      finally { 
        DOM.saveBtn.disabled = false;
        DOM.saveBtn.textContent = 'Save Product';
      }
    };

    window.editProduct = async function(slug) {
      try {
        const res = await fetch(WORKER_URL + '/products/' + slug, {
          headers: { 'Authorization': 'Bearer ' + API_SECRET }
        });
        const p = await res.json();
        
        document.getElementById('edit-slug').value = slug;
        document.getElementById('p-title').value = p.title || '';
        document.getElementById('p-code').value = p.code || '';
        document.getElementById('p-price').value = p.price || '';
        document.getElementById('p-stock').value = p.stock || '';
        document.getElementById('p-category').value = p.categories || '';
        document.getElementById('p-tags').value = Array.isArray(p.tags) ? p.tags.join(', ') : (p.tags || '');
        document.getElementById('p-desc').value = p.description || '';
        document.getElementById('p-content').value = p.content || '';
        
        DOM.previews.innerHTML = '';
        uploadedImages = [];
        currentStyles = p.styles || [];
        
        // Show current styles/images
        if (p.styles && p.styles.length > 0) {
            p.styles.forEach(s => {
                const img = document.createElement('img');
                img.src = s.image_path;
                img.className = 'rounded border shadow-sm';
                img.style.width = '60px';
                img.style.height = '60px';
                img.style.objectFit = 'cover';
                DOM.previews.appendChild(img);
            });
        }

        DOM.modalTitle.textContent = 'Edit Product';
        new bootstrap.Modal(document.getElementById('productModal')).show();
      } catch (e) { alert(e.message); }
    };

    window.deleteProduct = async function(slug) {
      if (!confirm('Delete ' + slug + '?')) return;
      try {
        await fetch(WORKER_URL + '/products/' + slug, {
          method: 'DELETE',
          headers: { 'Authorization': 'Bearer ' + API_SECRET }
        });
        loadProducts(DOM);
      } catch (e) { alert(e.message); }
    };
  }

  async function loadProducts(DOM) {
    DOM.list.innerHTML = '<tr><td colspan="5" class="text-center py-5"><div class="spinner-border spinner-border-sm text-primary"></div> Fetching...</td></tr>';
    try {
      const res = await fetch(WORKER_URL + '/products', {
        headers: { 'Authorization': 'Bearer ' + API_SECRET }
      });
      const data = await res.json();
      if (data.error) throw new Error(data.error);
      
      let html = '';
      data.forEach(p => {
        const slug = p.url ? p.url.split('/').pop() : 'no-slug';
        html += `<tr>
          <td class="ps-4">
            <div class="d-flex align-items-center">
                <img src="${p.img}" width="40" height="40" class="rounded me-3 object-fit-cover shadow-sm">
                <b>${p.title || 'Untitled'}</b>
            </div>
          </td>
          <td><code>${slug}</code></td>
          <td><span class="text-success">Rp ${p.harga || '0'}</span></td>
          <td><span class="badge ${p.stock === 'Tersedia' ? 'bg-success' : 'bg-danger'}">${p.stock || 'Habis'}</span></td>
          <td class="text-end pe-4">
            <button class="btn btn-sm btn-outline-dark" onclick="editProduct('${slug}')"><i class="fas fa-edit"></i></button>
            <button class="btn btn-sm btn-outline-danger" onclick="deleteProduct('${slug}')"><i class="fas fa-trash"></i></button>
          </td></tr>`;
      });
      DOM.list.innerHTML = html || '<tr><td colspan="5" class="text-center py-5 text-muted">No products found.</td></tr>';
    } catch (e) { 
        DOM.list.innerHTML = `<tr><td colspan="5" class="text-center py-5 text-danger">Error: ${e.message}</td></tr>`;
    }
  }

  const poll = setInterval(() => {
    if (typeof firebase !== 'undefined' && firebase.auth) {
      clearInterval(poll);
      init();
    }
  }, 100);
})();
</script>
