---
layout: admin
title: Admin Login
permalink: /admin/login
---

<div class="admin-login-container">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-5">
                <div class="card shadow-lg border-0 rounded-4">
                    <div class="card-header bg-dark text-white text-center py-4 border-0 rounded-top-4">
                        <h4 class="mb-0 fw-bold">Admin Dashboard</h4>
                        <p class="small mb-0 text-muted">Please sign in to continue</p>
                    </div>
                    <div class="card-body p-5">
                        <form id="login-form">
                            <div class="mb-4">
                                <label class="form-label fw-600 text-muted">Email Address</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="fas fa-envelope text-muted"></i></span>
                                    <input type="email" id="email" class="form-control bg-light border-0" placeholder="admin@example.com" required>
                                </div>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-600 text-muted">Password</label>
                                <div class="input-group">
                                    <span class="input-group-text bg-light border-0"><i class="fas fa-lock text-muted"></i></span>
                                    <input type="password" id="password" class="form-control bg-light border-0" placeholder="••••••••" required>
                                </div>
                            </div>
                            <div class="d-grid mb-3">
                                <button type="submit" class="btn btn-dark btn-lg rounded-3 py-3 fw-bold shadow-sm">
                                    Sign In <i class="fas fa-sign-in-alt ms-2"></i>
                                </button>
                            </div>
                            <div id="error-message" class="alert alert-danger d-none small"></div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
    .admin-login-container {
        min-height: 70vh;
        display: flex;
        align-items: center;
        background-color: #f8f9fa;
    }
    .fw-600 { font-weight: 600; }
    .input-group-text { border-radius: 0.5rem 0 0 0.5rem; }
    .form-control { border-radius: 0 0.5rem 0.5rem 0; }
    .btn-dark {
        background: #2d3436;
        border: none;
        transition: all 0.3s ease;
    }
    .btn-dark:hover {
        background: #000;
        transform: translateY(-2px);
    }
    footer, .footer-widget {
        display: none !important;
        visibility: hidden !important;
    }
</style>

<script type="module">
  const firebaseConfig = {
    apiKey: "{{ site.env.API_KEY }}",
    authDomain: "{{ site.env.AUTH_DOMAIN }}",
    projectId: "{{ site.env.PROJECT_ID }}",
    storageBucket: "{{ site.env.STORAGE_BUCKET }}",
    messagingSenderId: "{{ site.env.SENDER_ID }}",
    appId: "{{ site.env.APP_ID }}"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const db = firebase.firestore();

  async function checkAdminRole(user) {
    if (!user) return false;
    try {
      const doc = await db.collection('users').doc(user.uid).get();
      if (doc.exists && doc.data().role === 'admin') {
        return true;
      }
      return false;
    } catch (error) {
      console.error("Role check error:", error);
      return false;
    }
  }

  function getFriendlyMessage(error) {
    const code = error.code || '';
    switch (code) {
      case 'auth/invalid-email':
        return "Format email tidak valid.";
      case 'auth/user-not-found':
      case 'auth/wrong-password':
      case 'auth/invalid-login-credentials':
        return "Email atau password salah.";
      case 'auth/user-disabled':
        return "Akun ini telah dinonaktifkan.";
      case 'auth/too-many-requests':
        return "Terlalu banyak percobaan login. Silakan coba lagi nanti.";
      case 'auth/network-request-failed':
        return "Gagal terhubung ke server. Periksa koneksi internet Anda.";
      case 'auth/internal-error':
        return "Terjadi kesalahan internal. Silakan coba lagi.";
      default:
        // Handle case where message might be a JSON string from API
        if (error.message && error.message.includes('INVALID_LOGIN_CREDENTIALS')) {
            return "Email atau password salah.";
        }
        return error.message || "Terjadi kesalahan yang tidak diketahui.";
    }
  }

  document.getElementById('login-form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const email = document.getElementById('email').value;
    const password = document.getElementById('password').value;
    const errorDiv = document.getElementById('error-message');
    const submitBtn = e.target.querySelector('button[type="submit"]');
    
    errorDiv.classList.add('d-none');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span> Signing In...';
    
    try {
      const userCredential = await auth.signInWithEmailAndPassword(email, password);
      const isAdmin = await checkAdminRole(userCredential.user);
      
      if (isAdmin) {
        window.location.href = "{{ '/admin/' | relative_url }}";
      } else {
        await auth.signOut();
        throw { code: 'auth/access-denied', message: "Akses Ditolak: Anda tidak memiliki hak akses admin." };
      }
    } catch (error) {
      errorDiv.textContent = getFriendlyMessage(error);
      errorDiv.classList.remove('d-none');
      submitBtn.disabled = false;
      submitBtn.innerHTML = 'Sign In <i class="fas fa-sign-in-alt ms-2"></i>';
    }
  });

  // Redirect if already logged in as admin
  auth.onAuthStateChanged(async user => {
    if (user) {
      const isAdmin = await checkAdminRole(user);
      if (isAdmin) {
        window.location.href = "{{ '/admin/' | relative_url }}";
      } else {
        await auth.signOut();
      }
    }
  });
</script>
