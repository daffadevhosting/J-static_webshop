<script src="https://www.google.com/recaptcha/api.js" async defer></script>

<div class="user-profile-card mb-4">
  <div id="user-signed-in" class="d-flex align-items-center">
    <div class="profile-img-wrapper">
      <img id="userImg" src="{{ '/images/logo/placeholder.png' | relative_url }}" alt="Profile" />
    </div>
    <div class="profile-content flex-grow-1 ms-3">
      <span class="welcome-text">Welcome back,</span>
      <h5 id="user-display-name" class="user-name mb-0"></h5>
      <p id="user-email" class="user-email mb-0"></p>
    </div>
    <div class="profile-actions">
      <button class="btn-logout-modern" id="sign-out-button">
        <i class="fas fa-sign-out-alt me-1"></i> Sign Out
      </button>
    </div>
  </div>
</div>

<script type="module">
  const firebaseConfig = {
    apiKey: "{{ site.env.API_KEY }}",
    authDomain: "{{ site.env.AUTH_DOMAIN }}",
    databaseURL: "{{ site.env.DATABASE_URL }}",
    projectId: "{{ site.env.PROJECT_ID }}",
    storageBucket: "{{ site.env.STORAGE_BUCKET }}",
    messagingSenderId: "{{ site.env.SENDER_ID }}",
    appId: "{{ site.env.APP_ID }}",
    measurementId: "{{ site.env.MEASUREMENT_ID }}"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const userSignedInDiv = document.getElementById('user-signed-in');
  const userDisplayName = document.getElementById('user-display-name');
  const userEmail = document.getElementById('user-email');
  const signOutButton = document.getElementById('sign-out-button');

  function toggleUI() {
    if (auth.currentUser) {
      userDisplayName.textContent = auth.currentUser.displayName;
      userEmail.textContent = auth.currentUser.email;
      if (auth.currentUser.photoURL) {
        document.querySelector('#userImg').src = auth.currentUser.photoURL;
      }
    } else {
      location.href = "{{ '/signin' | relative_url }}";
    }
  }

  signOutButton.addEventListener('click', () => {
    auth.signOut();
  });

  auth.onAuthStateChanged(user => {
    toggleUI();
  });
</script>

<div class="card">
  <div class="card-header justify-content-center">
    <h3 class="text-muted">{{page.title}}</h3><br />
    <span class="badge text-danger">isi semua data dibawah.</span>
    <div class="float-end">Total Belanja: <span class="text-success fw-bold simpleCart_total"></span></div>
  </div>
  <div class="card-body">
    <form class="data-form validate-form mt-3" id="whatsapp-order">
      <input class="no_whatsapp" id="AdminToko" value="{{site.adminWa}}" type="hidden" />
      <div class="row">
        <section class="col-sm-6">
          <div class="form-group">
            <label class="control-label">Nama Lengkap</label>
            <input id="nama" type="text" class="form-control mb-2 nama wajib" placeholder="Nama Lengkap">
          </div>
        </section>
        <section class="col-sm-6">
          <div class="form-group">
            <label class="control-label">Nomor WhatsApp</label>
            <input id="nomor" type="number" min="11" class="form-control mb-2 nomor wajib" placeholder="Nomor WhatsApp">
          </div>
        </section>
      </div>
      <div class="row">
        <section class="col-sm-6">
          <div class="form-group">
            <label class="control-label">Alamat Email</label>
            <input id="email" type="email" class="form-control mb-2 email wajib" placeholder="Alamat E-mail">
          </div>
        </section>
        <section class="col-sm-6">
          <div class="form-group">
            <label class="control-label">Kurir</label>
            <select class="form-select mb-2 informasi wajib" placeholder="Pilih Kurir" interface="action-sheet">
              <option value="J&T Express">J&T Express</option>
              <option value="JNE Express">JNE Express</option>
              <option value="*Grab Express">*GrabExpress</option>
              <option value="*GoSend">*GoSend</option>
            </select>
          </div>
        </section>
      </div>
      <div class="row">
        <section class="col-sm-6">
          <div class="form-group">
            <label class="control-label">Alamat Pengiriman</label>
            <textarea id="alamat" class="form-control mb-2 alamat wajib" rows="5" placeholder="Alamat Rumah"></textarea>
          </div>
        </section>
        <section class="col-sm-6">
          <div class="form-group">
            <label class="control-label"></label>
            <input id="kota" class="form-control mb-2 kota wajib" placeholder="Kota">
            <input id="provinsi" class="form-control mb-2 provinsi wajib" placeholder="Provinsi">
            <input id="kodepos" class="form-control mb-2 kodepos wajib" placeholder="Kode Pos">
          </div>
        </section>
      </div>
      <div class="text-center mt-3">
        <button type="button" class="btn btn-success btn-lg w-100 order" id="order">
          <i class="fab fa-whatsapp me-2"></i> Send Order via WhatsApp
        </button>
      </div>
    </form>
  </div>
</div>
