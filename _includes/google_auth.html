<div class="signin-container">
  <div class="signin-card">
    <div class="signin-header">
      <div class="brand-logo">
        <i class="fas fa-shopping-bag"></i>
      </div>
      <h1 class="signin-title">Authentication</h1>
      <p class="signin-subtitle">Log in to your account to continue checkout</p>
    </div>

    <div id="user-signed-out" class="signin-body">
      <button class="btn-google-login" id="sign-in-button">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 48 48">
          <path fill="#FFC107" d="M43.611,20.083H42V20H24v8h11.303c-1.649,4.657-6.08,8-11.303,8c-6.627,0-12-5.373-12-12c0-6.627,5.373-12,12-12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C12.955,4,4,12.955,4,24c0,11.045,8.955,20,20,20c11.045,0,20-8.955,20-20C44,22.659,43.862,21.35,43.611,20.083z"/>
          <path fill="#FF3D00" d="M6.306,14.691l6.571,4.819C14.655,15.108,18.961,12,24,12c3.059,0,5.842,1.154,7.961,3.039l5.657-5.657C34.046,6.053,29.268,4,24,4C16.318,4,9.656,8.337,6.306,14.691z"/>
          <path fill="#4CAF50" d="M24,44c5.166,0,9.86-1.977,13.409-5.192l-6.19-5.238C29.211,35.091,26.715,36,24,36c-5.202,0-9.619-3.317-11.283-7.946l-6.522,5.025C9.505,39.556,16.227,44,24,44z"/>
          <path fill="#1976D2" d="M43.611,20.083H42V20H24v8h11.303c-0.792,2.237-2.231,4.166-4.087,5.571c0.001-0.001,0.002-0.001,0.003-0.002l6.19,5.238C36.971,39.205,44,34,44,24C44,22.659,43.862,21.35,43.611,20.083z"/>
        </svg>
        <span>Sign in with Google</span>
      </button>
    </div>

    <div class="signin-footer">
      <p>&copy; {{ site.time | date: '%Y' }} {{ site.title }}. All rights reserved.</p>
    </div>
  </div>
</div>

<style>
  .signin-container {
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 70vh;
    padding: 20px;
  }

  .signin-card {
    background: #ffffff;
    border-radius: 24px;
    padding: 40px;
    width: 100%;
    max-width: 420px;
    box-shadow: 0 20px 40px rgba(0, 0, 0, 0.08);
    text-align: center;
    border: 1px solid rgba(0, 0, 0, 0.05);
  }

  .brand-logo {
    width: 60px;
    height: 60px;
    background: linear-gradient(135deg, #007bff, #0056b3);
    color: white;
    border-radius: 16px;
    display: flex;
    justify-content: center;
    align-items: center;
    font-size: 24px;
    margin: 0 auto 24px;
    box-shadow: 0 8px 16px rgba(0, 123, 255, 0.3);
  }

  .signin-title {
    font-size: 1.75rem;
    font-weight: 800;
    color: #1a1a1a;
    margin-bottom: 8px;
    letter-spacing: -0.5px;
  }

  .signin-subtitle {
    color: #6c757d;
    font-size: 0.95rem;
    margin-bottom: 32px;
  }

  .btn-google-login {
    width: 100%;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: #ffffff;
    color: #3c4043;
    border: 1px solid #dadce0;
    padding: 12px 24px;
    font-size: 1rem;
    font-weight: 600;
    border-radius: 12px;
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .btn-google-login:hover {
    background: #f8f9fa;
    border-color: #d2d4d7;
    box-shadow: 0 1px 3px rgba(60, 64, 67, 0.3), 0 4px 8px rgba(60, 64, 67, 0.15);
  }

  .btn-google-login:active {
    background: #eeeeee;
  }

  .signin-footer {
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid #f0f0f0;
    font-size: 0.8rem;
    color: #adb5bd;
  }


  .footer-widget {
    display: none !important;
  }

  @media (max-width: 480px) {
    .signin-card {
      padding: 30px 20px;
    }
  }
</style>

<script type="module">
  const firebaseConfig = {
    apiKey: "{{ site.env.API_KEY }}",
    authDomain: "{{ site.env.AUTH_DOMAIN }}",
    databaseURL: "{{ site.env.DATABASE_URL }}",
    projectId: "{{ site.env.PROJECT_ID }}",
    storageBucket: "{{ site.env.STORAGE_BUCKET }}",
    messagingSenderId: "{{ site.env.SENDER_ID }}",
    appId: "{{ site.env.APP_ID }}",
    measurementId: "{{ site.env.MEASUREMENT_ID }}"
  };
  firebase.initializeApp(firebaseConfig);
  const auth = firebase.auth();
  const signInButton = document.getElementById('sign-in-button');

  function toggleUI() {
    if (auth.currentUser) {
      location.href = "{{site.baseurl}}/checkout";
    }
  }

  signInButton.addEventListener('click', () => {
    const provider = new firebase.auth.GoogleAuthProvider();
    auth.signInWithPopup(provider).catch(error => {
      console.error("Auth error:", error);
      if (window.showAlert) {
        window.showAlert("Login Failed", error.message, "error");
      } else {
        alert("Login failed: " + error.message);
      }
    });
  });

  auth.onAuthStateChanged(user => {
    toggleUI();
  });
</script>
