<div class="d-flex flex-wrap justify-content-between align-items-center py-2 my-2">
    <div class="col-md-4 d-flex align-items-center">
      <span class="text-muted">Blog Post</span>
    </div>
    <div class="col-md-4 d-flex justify-content-end">
      <a class="btn btn-sm btn-dark" href="{{ '/blogs' | relative_url }}" role="button">Lihat Blog</a>
    </div>
</div>
<div class="row">
{% for blog in site.blogs limit:2 %}
  <div class="col-sm-6">
    <div class="card kartu_iklan shadow-sm">
        <img class="thumb_img" src="{{blog.image_path}}" width="100%" height="200px" alt="{{blog.title}}"/>
<div class="card-img-overlay" style="background-color:#11221159;">
<h5 class="card-title text-white">{{blog.title}}</h5>
 <small class="card-text text-white">{{blog.description}}</small>
</div>
  <div class="card-img-overlay middle">
    <a type="button" class="btn btn-sm btn-dark" href="{{ blog.url | relative_url }}">Baca Artikel</a>
  </div>
    </div>
  </div>
{% endfor %}
</div>
